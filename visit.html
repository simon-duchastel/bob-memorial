<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visit Bob</title>
  <script>
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') document.documentElement.classList.add('dark');
    else if (saved === 'light') document.documentElement.classList.add('light');
    else if (matchMedia('(prefers-color-scheme: dark)').matches)
      document.documentElement.classList.add('dark');
  })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="visit.html">Visit</a>
    <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
      <span class="switch-thumb">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
    </button>
  </nav>

  <main>
    <h1>Visit</h1>

    <figure>
      <img src="images/bob-map.jpg" alt="Bob's resting place at Hartsdale Pet Cemetery">
      <figcaption>Hartsdale Pet Cemetery</figcaption>
    </figure>

    <p>Bob rests peacefully at <a href="https://petcem.com/" target="_blank" rel="noopener">Hartsdale Pet Cemetery</a> in Hartsdale, New York.</p>

    <p>
      <strong>Address:</strong><br>
      100 N Washington Ave<br>
      Hartsdale, NY 10530
    </p>

    <p>
      <a href="https://www.google.com/maps/search/?api=1&query=41.021139,-73.797556" target="_blank" rel="noopener">
        Open in Google Maps &rarr;
      </a>
    </p>
  </main>

  <footer>
    &copy; 2026 Simon Duchastel
  </footer>
  <script src="theme.js"></script>
</body>
</html>
