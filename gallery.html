<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bob Gallery</title>
  <script>
  (function() {
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
      else if (saved === 'light') document.documentElement.classList.add('light');
      else if (matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.add('dark');
      else
        document.documentElement.classList.add('light');
    } catch (e) {
      if (matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.add('dark');
      else
        document.documentElement.classList.add('light');
    }
  })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="visit.html">Visit</a>
    </div>
    <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
      <span class="switch-thumb">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
    </button>
  </nav>

  <main>
    <h1>Gallery</h1>

    <figure class="gallery">
      <label for="lb-regal" class="lightbox-trigger">
        <img src="images/regal.jpg" alt="Bob being regal">
      </label>
    </figure>

    <input type="checkbox" id="lb-regal" hidden>
    <label for="lb-regal" class="lightbox">
      <span class="lightbox-close">&times;</span>
      <img src="images/regal.jpg" alt="Bob being regal">
    </label>

    <figure class="gallery">
      <label for="lb-relaxed" class="lightbox-trigger">
        <img src="images/relaxed.jpg" alt="Bob relaxing on his hammock">
      </label>
    </figure>

    <input type="checkbox" id="lb-relaxed" hidden>
    <label for="lb-relaxed" class="lightbox">
      <span class="lightbox-close">&times;</span>
      <img src="images/relaxed.jpg" alt="Bob relaxing on his hammock">
    </label>

    <figure class="gallery">
      <label for="lb-scratches" class="lightbox-trigger">
        <img src="images/scratches.jpg" alt="Bob enjoying some nice scratches">
      </label>
    </figure>

    <input type="checkbox" id="lb-scratches" hidden>
    <label for="lb-scratches" class="lightbox">
      <span class="lightbox-close">&times;</span>
      <img src="images/scratches.jpg" alt="Bob enjoying some nice scratches">
    </label>

    <figure class="gallery">
      <label for="lb-held" class="lightbox-trigger">
        <img src="images/held.jpg" alt="Bob held by his longtime friend, Simon">
      </label>
    </figure>

    <input type="checkbox" id="lb-held" hidden>
    <label for="lb-held" class="lightbox">
      <span class="lightbox-close">&times;</span>
      <img src="images/held.jpg" alt="Bob held by his longtime friend, Simon">
    </label>

    <figure class="gallery">
      <label for="lb-watching" class="lightbox-trigger">
        <img src="images/watching.jpg" alt="Bob observing all from his perch atop the hammock">
      </label>
    </figure>

    <input type="checkbox" id="lb-watching" hidden>
    <label for="lb-watching" class="lightbox">
      <span class="lightbox-close">&times;</span>
      <img src="images/watching.jpg" alt="Bob observing all from his perch atop the hammock">
    </label>

    <figure class="gallery">
      <label for="lb-chilling" class="lightbox-trigger">
        <img src="images/chilling.jpg" alt="Bob nestled in a spot between the sofa and the window in the sun in Seattle">
      </label>
    </figure>

    <input type="checkbox" id="lb-chilling" hidden>
    <label for="lb-chilling" class="lightbox">
      <span class="lightbox-close">&times;</span>
      <img src="images/chilling.jpg" alt="Bob nestled in a spot between the sofa and the window in the sun in Seattle">
    </label>
  </main>
